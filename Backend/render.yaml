services:
  - type: web
    name: employee-management-api
    env: node
    plan: free
    buildCommand: npm install && npm run build && npm run db:fix-refresh-token
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # Set your TiDB Cloud connection string in the Render dashboard.
      # Must include sslaccept=strict (auto-added for *.tidbcloud.com if omitted).
      - key: DATABASE_URL
        sync: false
      # Set this to your Vercel frontend URL (no trailing slash).
      # Multiple URLs: comma-separated, e.g. https://app.vercel.app,https://app-git-main.vercel.app
      - key: CLIENT_URL
        value: https://your-frontend.vercel.app

# Database is hosted on TiDB Cloud — set DATABASE_URL manually in Render dashboard.
