services:
  - type: web
    name: employee-management-api
    env: node
    plan: free
    buildCommand: npm install && npm run build && npm run db:fix-refresh-token
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      # REQUIRED: TiDB Cloud MySQL URL (sslaccept=strict is auto-added for *.tidbcloud.com).
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CLIENT_URL
        value: https://employee-management-livid-rho.vercel.app

# Database is hosted on TiDB Cloud — set DATABASE_URL manually in Render dashboard.
