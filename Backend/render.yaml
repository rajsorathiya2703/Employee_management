services:
  - type: web
    name: employee-management-api
    env: node
    plan: free
    buildCommand: npm install && npm run build && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: employee-db
          property: connectionString
      # Set this to your Vercel frontend URL (no trailing slash).
      # Multiple URLs: comma-separated, e.g. https://app.vercel.app,https://app-git-main.vercel.app
      - key: CLIENT_URL
        value: https://your-frontend.vercel.app

databases:
  - name: employee-db
    databaseName: employee_management
    user: postgres
    plan: free
